{% extends 'admin/base.html' %}

{% block content %}
<h1 class="mb-4">Change password for {{ user_obj.username }}</h1>

<form method="post">
    {% csrf_token %}
    <div class="card p-4 mb-3">
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url list_url_name %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>

{% endblock %}
