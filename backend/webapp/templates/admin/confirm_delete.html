{% extends 'admin/base.html' %}

{% block content %}
<h1 class="mb-4">Delete {{ model_name }}</h1>

<p>Are you sure you want to delete this {{ model_name }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url list_url_name %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
