<!-- AI Chat Widget -->
<style>
    /* AI Chat widget */
    .ai-chat-widget {
        position: fixed !important;
        bottom: 24px !important;
        right: 24px !important;
        width: 320px;
        max-width: calc(100vw - 48px);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        z-index: 9999 !important;
        pointer-events: auto;
    }

    /* Ensure the toggle button stays in the lower right corner */
    .ai-chat-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 10001;
    }

    .ai-chat-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4c51bf, #2b6cb0);
        color: white;
        border: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ai-chat-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }

    .ai-chat-panel {
        display: none;
        flex-direction: column;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        width: 100%;
        max-height: 520px;
        backdrop-filter: blur(12px);
    }

    .ai-chat-panel.open {
        display: flex;
    }

    .ai-chat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        background: linear-gradient(90deg, #4c51bf, #2b6cb0);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .ai-chat-header .ai-close-btn {
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.85);
        font-size: 1.2rem;
        cursor: pointer;
    }

    .ai-chat-messages {
        flex: 1;
        padding: 12px 12px 8px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.82);
    }

    .ai-message {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
    }

    .ai-message.ai-user {
        justify-content: flex-end;
    }

    .ai-message-bubble {
        max-width: 70%;
        padding: 10px 12px;
        border-radius: 16px;
        line-height: 1.4;
        font-size: 0.9rem;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    .ai-message.ai-user .ai-message-bubble {
        background: #4c51bf;
        color: white;
        border-bottom-right-radius: 4px;
    }

    .ai-message.ai-bot .ai-message-bubble {
        background: rgba(66, 153, 225, 0.15);
        color: #0f172a;
        border-bottom-left-radius: 4px;
    }

    .ai-chat-form {
        display: flex;
        gap: 10px;
        padding: 12px 14px;
        border-top: 1px solid rgba(0,0,0,0.08);
        background: rgba(255, 255, 255, 0.93);
    }

    .ai-chat-input {
        flex: 1;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,0.14);
        padding: 10px 14px;
        font-size: 0.94rem;
        outline: none;
    }

    .ai-chat-submit {
        border-radius: 999px;
        border: none;
        background: #4c51bf;
        color: white;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s ease;
    }

    .ai-chat-submit:hover {
        background: #3730a3;
    }

    .ai-chat-status {
        padding: 8px 14px;
        font-size: 0.82rem;
        color: rgba(55, 65, 81, 0.9);
        text-align: center;
    }
</style>

<div class="ai-chat-widget" id="aiChatWidget">
    <button type="button" id="aiChatToggle" class="ai-chat-toggle" aria-label="Open AI chat">
        <span style="font-size: 1.3rem;">💬</span>
    </button>

    <div id="aiChatPanel" class="ai-chat-panel" role="dialog" aria-label="AI Chat">
        <div class="ai-chat-header">
            <span>EduTrack Assistant</span>
            <button type="button" id="aiChatClose" class="ai-close-btn" aria-label="Close chat">×</button>
        </div>
        <div id="aiChatMessages" class="ai-chat-messages" aria-live="polite"></div>

        <div id="aiChatStatus" class="ai-chat-status" role="status" aria-live="polite" style="display:none;">Sending...</div>

        <form id="aiChatForm" class="ai-chat-form">
            <input id="aiChatInput" class="ai-chat-input" type="text" autocomplete="off" placeholder="Ask about attendance, login or courses..." />
            <button type="submit" class="ai-chat-submit">Send</button>
        </form>
    </div>
</div>

<script>
    (function () {
        const toggleBtn = document.getElementById('aiChatToggle');
        const panel = document.getElementById('aiChatPanel');
        const closeBtn = document.getElementById('aiChatClose');
        const form = document.getElementById('aiChatForm');
        const input = document.getElementById('aiChatInput');
        const messages = document.getElementById('aiChatMessages');
        const status = document.getElementById('aiChatStatus');

        const getCsrfToken = () => {
            const match = document.cookie.match(/(^|;)\s*csrftoken\s*=\s*([^;]+)/);
            return match ? match.pop() : '';
        };

        const appendMessage = (text, from) => {
            const wrapper = document.createElement('div');
            wrapper.className = `ai-message ai-${from}`;
            const bubble = document.createElement('div');
            bubble.className = 'ai-message-bubble';
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        };

        const setStatus = (text) => {
            if (!text) {
                status.style.display = 'none';
                status.textContent = '';
                return;
            }
            status.style.display = 'block';
            status.textContent = text;
        };

        const openChat = () => {
            panel.classList.add('open');
            input.focus();
        };

        const closeChat = () => {
            panel.classList.remove('open');
        };

        const sendMessage = async (message) => {
            setStatus('Thinking...');

            try {
                const response = await fetch('{% url "ai_chat" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken(),
                    },
                    body: JSON.stringify({ message }),
                    credentials: 'same-origin',
                });

                if (!response.ok) {
                    throw new Error('Response not ok');
                }

                const data = await response.json();
                if (data.reply) {
                    appendMessage(data.reply, 'bot');
                } else if (data.error) {
                    appendMessage('Sorry, I could not process that. Please try again.', 'bot');
                }

            } catch (err) {
                appendMessage('Unable to reach the server. Please try again later.', 'bot');
            } finally {
                setStatus('');
            }
        };

        toggleBtn.addEventListener('click', () => {
            if (panel.classList.contains('open')) {
                closeChat();
            } else {
                openChat();
            }
        });

        closeBtn.addEventListener('click', closeChat);

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const message = input.value.trim();
            if (!message) {
                return;
            }

            appendMessage(message, 'user');
            input.value = '';
            sendMessage(message);
        });

        // Pre-populate a starter bot message
        appendMessage('Hi there! Ask me about attendance, courses, or logging in.', 'bot');
    })();
</script>
