<!DOCTYPE html>
<html>
<head>
    <title>Update Student Marks</title>
    {% include "includes/theme_variables.html" %}
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 2rem;
        }
        form {
            max-width: 480px;
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }
        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    {% include "includes/theme_toggle_button.html" %}
    <h1>Update Student Marks</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update Marks</button>
    </form>

</body>
</html>
