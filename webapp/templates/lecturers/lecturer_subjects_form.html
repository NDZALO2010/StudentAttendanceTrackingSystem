<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Subjects</title>
    {% include "includes/theme_variables.html" %}
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 2rem;
        }
        form {
            display: flex;
            flex-direction: column;
            max-width: 360px;
            gap: 0.75rem;
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        input {
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 0.75rem;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.75rem;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    {% include "includes/theme_toggle_button.html" %}
    <form method="post">
        {% csrf_token %}
        <label for="lecturer_id">Lecturer ID:</label>
        <input type="text" id="lecturer_id" name="lecturer_id" required>
        
        <button type="submit">Get Subjects</button>
    </form>
</body>
</html>
