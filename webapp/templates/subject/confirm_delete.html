<!DOCTYPE html>
<html>
<head>
    <title>Delete Subject</title>
    {% include "includes/theme_variables.html" %}
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 2rem;
        }
        form {
            max-width: 480px;
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }
        button, a {
            margin-top: 1rem;
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }
        a {
            margin-left: 0.5rem;
            color: var(--accent);
        }
    </style>
</head>
<body>
    {% include "includes/theme_toggle_button.html" %}
    <h2>Are you sure you want to delete subject {{ subject.subjectName }}?</h2>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'subject_list' %}">Cancel</a>
    </form>
</body>
</html>
